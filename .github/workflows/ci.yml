name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v4

      - name: Build library
        run: ./gradlew :kotlinlocalemanager:assembleRelease

      - name: Run unit tests
        run: ./gradlew :kotlinlocalemanager:test

      - name: Check code style (ktlint)
        run: ./gradlew :kotlinlocalemanager:ktlintCheck
